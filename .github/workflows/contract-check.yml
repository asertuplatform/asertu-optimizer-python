name: Contract Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Validate published OpenAPI contract
        env:
          ASERTU_CONTRACT_URL: https://optimizer.dev.asertu.ai/openapi/optimizer-openapi.yaml
          ASERTU_RUN_LIVE_CONTRACT_TEST: "1"
        run: python -m pytest tests/test_openapi_contract.py -q
